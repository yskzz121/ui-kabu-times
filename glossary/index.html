.term-card.expanded .expand-icon {

/* Term body */
.term-body {

.term-body-inner {

.term-full {

.vis-diagram-title {

/* Flow diagram with arrows */
.vis-flow {

}
.vis-flow-step {

}
.vis-flow-step.negative {

}
.vis-flow-step.positive {

  border-color: rgba(63,185,80,.3);
}
.vis-flow-arrow {

}

/* Gauge/meter */
.vis-gauge {
  margin: 8px 0;
}
.vis-gauge-label {

  justify-content: space-between;
  font-size: 11px;
  color: var(--text-muted);
  margin-bottom: 4px;
}
.vis-gauge-bar {

  border-radius: 12px;

  overflow: hidden;
}
.vis-gauge-marker {
  position: absolute;
  top: -4px;
  width: 4px;
  height: 32px;
  background: #fff;

  box-shadow: 0 0 6px rgba(0,0,0,.5);
}

/* CSS horizontal bar chart */
.vis-bars { display: flex; flex-direction: column; gap: 8px; }
.vis-bar-item { display: flex; align-items: center; gap: 10px; }
.vis-bar-label { min-width: 80px; font-size: 12px; color: var(--text-secondary); text-align: right; }
.vis-bar-track { flex: 1; height: 22px; background: rgba(255,255,255,.04); border-radius: 6px; overflow: hidden; position: relative; }
.vis-bar-fill { height: 100%; border-radius: 6px; display: flex; align-items: center; justify-content: flex-end; padding-right: 8px; font-size: 11px; font-weight: 700; color: #fff; transition: width .6s ease; }
.vis-bar-fill.blue { background: var(--accent); }

.vis-bar-fill.red { background: var(--accent-red); }

.vis-table { width: 100%; border-collapse: collapse; font-size: 12px; }

.vis-dotplot-grid {

}
.vis-dot {

.vis-timeline {

/* HBM stack */
.vis-hbm-stack {

}
.vis-hbm-layer {

/* No results */
.no-results {

/* Footer */

/* Responsive for visuals */

}
</style>

// Category definitions
var CATEGORIES = [

  { key: "indicators", label: "経済指標", labelEn: "Economic Indicators", icon: "📊" },

var activeCat = "all";
var searchQuery = "";

// あいうえお順ソート用：日本語名の読み仮名マップ

  "FOMC":"えふおーえむしー","FF金利":"えふえふきんり","ドットプロット":"どっとぷろっと",
  "SEP":"えすいーぴー","bp（ベーシスポイント）":"べーしすぽいんと","QT（量的引き締め）":"きゅーてぃー",
  "フォワードガイダンス":"ふぉわーどがいだんす","PPI":"ぴーぴーあい","CPI":"しーぴーあい",
  "PCE":"ぴーしーいー","スタグフレーション":"すたぐふれーしょん","VIX":"びっくす",
  "TOPIX":"とぴっくす","Brent原油":"ぶれんとげんゆ","EPS":"いーぴーえす",
  "ガイダンス":"がいだんす","アフターアワーズ":"あふたーあわーず","自社株買い":"じしゃかぶかい",
  "時価総額":"じかそうがく","HBM":"えいちびーえむ","GTC":"じーてぃーしー",
  "ホルムズ海峡":"ほるむずかいきょう","ジョーンズ法":"じょーんずほう","通商法301条":"つうしょうほう",
  "公示地価":"こうじちか","基準地価":"きじゅんちか","軍用地":"ぐんようち","倍率（軍用地）":"ばいりつ",
  "キャピタルゲイン":"きゃぴたるげいん","インカムゲイン":"いんかむげいん","利回り（不動産）":"りまわり",
  "区分マンション":"くぶんまんしょん","宅地見込地":"たくちみこみち","相続税評価額":"そうぞくぜいひょうかがく",
  "基地返還跡地":"きちへんかんあとち","カタリスト":"かたりすと","インバウンド":"いんばうんど",
  "リスク・リターン":"りすくりたーん"
};

function getYomi(ja) {
  return YOMI[ja] || ja.toLowerCase();
}

function toggleSort() {
  sortAiueo = !sortAiueo;
  var btn = document.getElementById("sortBtn");
  btn.classList.toggle("active", sortAiueo);
  btn.textContent = sortAiueo ? "✓ あいうえお順" : "あ→わ あいうえお順";
  renderTerms();
}

function renderTerms() {
  var section = document.getElementById("termsSection");
  var noResults = document.getElementById("noResults");
  var countEl = document.getElementById("searchCount");
  var q = searchQuery.toLowerCase().trim();

  // Filter terms
  var filtered = TERMS.filter(function(t) {
    var catMatch = (activeCat === "all") || (t.cat === activeCat);
    if (!catMatch) return false;
    if (!q) return true;
    return t.ja.toLowerCase().indexOf(q) !== -1 ||
           t.en.toLowerCase().indexOf(q) !== -1 ||
           t.short.toLowerCase().indexOf(q) !== -1 ||
           t.full.toLowerCase().indexOf(q) !== -1;
  });

  // Show count when searching
  if (q) {
    countEl.textContent = filtered.length + "件の用語が見つかりました";
  } else {
    countEl.textContent = "";
  }

  if (filtered.length === 0) {
    section.innerHTML = "";
    noResults.style.display = "block";
    return;
  }
  noResults.style.display = "none";

  function renderCard(t) {
    var h = '';
    h += '<div class="term-card" data-id="' + t.id + '">';
    h += '<div class="term-header" onclick="toggleTerm(\'' + t.id + '\')">';
    h += '<div class="term-names">';
    h += '<div class="term-ja">' + highlightMatch(t.ja, q) + '</div>';
    h += '<div class="term-en">' + highlightMatch(t.en, q) + '</div>';
    h += '<div class="term-short">' + highlightMatch(t.short, q) + '</div>';
    h += '<div class="term-badges">';
    if (t.morning) {
      h += '<span class="badge-morning">📰 朝刊で学ぶ</span>';
    }
    h += '<span class="badge-cat">' + t.catIcon + ' ' + t.catLabel + '</span>';
    h += '</div>';
    h += '</div>';
    h += '<div class="expand-icon">▼</div>';
    h += '</div>';
    h += '<div class="term-body"><div class="term-body-inner">';
    h += '<div class="term-full">' + highlightMatch(t.full, q) + '</div>';
    if (t.visual) {
      h += '<div class="term-visual">' + t.visual + '</div>';
    }
    h += '</div></div>';
    h += '</div>';
    return h;
  }

  var html = "";

  if (sortAiueo) {
    // あいうえお順: フラット表示
    var sorted = filtered.slice().sort(function(a, b) {
      return getYomi(a.ja).localeCompare(getYomi(b.ja), 'ja');
    });
    html += '<div class="category-group">';
    html += '<div class="category-header">';
    html += '<span class="cat-icon">あ</span>';
    html += '<h2>あいうえお順 <span class="cat-en">Alphabetical (Japanese)</span></h2>';
    html += '</div>';
    sorted.forEach(function(t) { html += renderCard(t); });
    html += '</div>';
  } else {
    // カテゴリ別表示
    var groups = {};
    CATEGORIES.forEach(function(c) { groups[c.key] = []; });
    filtered.forEach(function(t) {
      if (groups[t.cat]) groups[t.cat].push(t);
    });

    CATEGORIES.forEach(function(cat) {
      var terms = groups[cat.key];
      if (terms.length === 0) return;
      html += '<div class="category-group">';
      html += '<div class="category-header">';
      html += '<span class="cat-icon">' + cat.icon + '</span>';
      html += '<h2>' + cat.label + ' <span class="cat-en">' + cat.labelEn + '</span></h2>';
      html += '</div>';
      terms.forEach(function(t) { html += renderCard(t); });
      html += '</div>';
    });
  }

  section.innerHTML = html;
}

function highlightMatch(text, q) {
  if (!q) return text;
  var idx = text.toLowerCase().indexOf(q);
  if (idx === -1) return text;
  return text.substring(0, idx) +
    '<mark style="background:rgba(88,166,255,0.2);color:var(--accent);border-radius:2px;padding:0 2px">' +
    text.substring(idx, idx + q.length) + '</mark>' +
    text.substring(idx + q.length);
}

function toggleTerm(id) {
  var card = document.querySelector('.term-card[data-id="' + id + '"]');
  if (card) card.classList.toggle("expanded");
}

// Filter buttons
document.getElementById("filters").addEventListener("click", function(e) {
  var btn = e.target.closest(".filter-btn");
  if (!btn) return;
  activeCat = btn.dataset.cat;
  document.querySelectorAll(".filter-btn").forEach(function(b) {
    b.classList.remove("active");
  });
  btn.classList.add("active");
  renderTerms();
});

// Search
document.getElementById("searchInput").addEventListener("input", function(e) {
  searchQuery = e.target.value;
  renderTerms();
});

// Initial render
renderTerms();
</script>
