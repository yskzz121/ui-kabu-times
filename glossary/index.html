  border-radius: 8px;
  background: transparent;
  color: var(--text-secondary);
  font-size: 12px;
  font-family: var(--font-sans);
  font-weight: 600;

}
.sort-btn:hover {

  color: var(--text-primary);
}

  height: 24px;

  font-size: 12px;

  margin-top: 2px;

.term-card.expanded .expand-icon {

}

.term-body {
  max-height: 0;
  overflow: hidden;
  transition: max-height .35s ease, opacity .25s ease;

}
.term-card.expanded .term-body {
  max-height: 600px;
  opacity: 1;
}
.term-body-inner {
  padding: 0 18px 18px;
  border-top: 1px solid var(--border);
  margin-top: 0;
  padding-top: 16px;

.term-full {

  color: var(--text-secondary);
  line-height: 1.85;

/* Footer */

  font-size: 13px;

/* Mobile */
@media (max-width: 768px) {
  .header { padding: 48px 16px 32px; }

  .term-full { font-size: 13px; }
  .category-header h2 { font-size: .95em; }
  .back-link { padding: 6px 10px; font-size: .7rem; }
}
@media (max-width: 480px) {
  .header h1 { font-size: 1.3em; }
  .filter-btn { padding: 5px 10px; font-size: 11px; }
}

function getYomi(ja) {
  return YOMI[ja] || ja.toLowerCase();
}

function toggleSort() {
  sortAiueo = !sortAiueo;
  var btn = document.getElementById("sortBtn");
  btn.classList.toggle("active", sortAiueo);
  btn.textContent = sortAiueo ? "✓ あいうえお順" : "あ→わ あいうえお順";
  renderTerms();
}

function renderTerms() {
  var section = document.getElementById("termsSection");
  var noResults = document.getElementById("noResults");
  var countEl = document.getElementById("searchCount");
  var q = searchQuery.toLowerCase().trim();

  // Filter terms
  var filtered = TERMS.filter(function(t) {
    var catMatch = (activeCat === "all") || (t.cat === activeCat);
    if (!catMatch) return false;
    if (!q) return true;
    return t.ja.toLowerCase().indexOf(q) !== -1 ||
           t.en.toLowerCase().indexOf(q) !== -1 ||
           t.short.toLowerCase().indexOf(q) !== -1 ||
           t.full.toLowerCase().indexOf(q) !== -1;
  });

  // Show count when searching
  if (q) {
    countEl.textContent = filtered.length + "件の用語が見つかりました";
  } else {
    countEl.textContent = "";
  }

  if (filtered.length === 0) {
    section.innerHTML = "";
    noResults.style.display = "block";
    return;
  }
  noResults.style.display = "none";

  function renderCard(t) {
    var h = '';
    h += '<div class="term-card" data-id="' + t.id + '">';
    h += '<div class="term-header" onclick="toggleTerm(\'' + t.id + '\')">';
    h += '<div class="term-names">';
    h += '<div class="term-ja">' + highlightMatch(t.ja, q) + '</div>';
    h += '<div class="term-en">' + highlightMatch(t.en, q) + '</div>';
    h += '<div class="term-short">' + highlightMatch(t.short, q) + '</div>';
    h += '<div class="term-badges">';
    if (t.morning) {
      h += '<span class="badge-morning">📰 朝刊で学ぶ</span>';
    }
    h += '<span class="badge-cat">' + t.catIcon + ' ' + t.catLabel + '</span>';
    h += '</div>';
    h += '</div>';
    h += '<div class="expand-icon">▼</div>';
    h += '</div>';
    h += '<div class="term-body"><div class="term-body-inner">';
    h += '<div class="term-full">' + highlightMatch(t.full, q) + '</div>';
    h += '</div></div>';
    h += '</div>';
    return h;
  }

  var html = "";

  if (sortAiueo) {
    // あいうえお順: フラット表示
    var sorted = filtered.slice().sort(function(a, b) {
      return getYomi(a.ja).localeCompare(getYomi(b.ja), 'ja');
    });
    html += '<div class="category-group">';
    html += '<div class="category-header">';
    html += '<span class="cat-icon">あ</span>';
    html += '<h2>あいうえお順 <span class="cat-en">Alphabetical (Japanese)</span></h2>';
    html += '</div>';
    sorted.forEach(function(t) { html += renderCard(t); });
    html += '</div>';
  } else {
    // カテゴリ別表示
    var groups = {};
    CATEGORIES.forEach(function(c) { groups[c.key] = []; });
    filtered.forEach(function(t) {
      if (groups[t.cat]) groups[t.cat].push(t);
    });

    CATEGORIES.forEach(function(cat) {
      var terms = groups[cat.key];
      if (terms.length === 0) return;
      html += '<div class="category-group">';
      html += '<div class="category-header">';
      html += '<span class="cat-icon">' + cat.icon + '</span>';
      html += '<h2>' + cat.label + ' <span class="cat-en">' + cat.labelEn + '</span></h2>';
      html += '</div>';
      terms.forEach(function(t) { html += renderCard(t); });
      html += '</div>';
    });
  }

  section.innerHTML = html;
}

function highlightMatch(text, q) {
  if (!q) return text;
  var idx = text.toLowerCase().indexOf(q);
  if (idx === -1) return text;
  return text.substring(0, idx) +
    '<mark style="background:rgba(88,166,255,0.2);color:var(--accent);border-radius:2px;padding:0 2px">' +
    text.substring(idx, idx + q.length) + '</mark>' +
    text.substring(idx + q.length);
}

function toggleTerm(id) {
  var card = document.querySelector('.term-card[data-id="' + id + '"]');
  if (card) card.classList.toggle("expanded");
}

// Filter buttons
document.getElementById("filters").addEventListener("click", function(e) {
  var btn = e.target.closest(".filter-btn");
  if (!btn) return;
  activeCat = btn.dataset.cat;
  document.querySelectorAll(".filter-btn").forEach(function(b) {
    b.classList.remove("active");
  });
  btn.classList.add("active");
  renderTerms();
});

// Search
document.getElementById("searchInput").addEventListener("input", function(e) {
  searchQuery = e.target.value;
  renderTerms();
});

// Initial render
renderTerms();
